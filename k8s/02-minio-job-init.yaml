apiVersion: batch/v1
kind: Job
metadata:
  name: minio-init-bucket
  namespace: overdrive-ota
spec:
  ttlSecondsAfterFinished: 3600
  backoffLimit: 10
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: minio/mc:RELEASE.2024-11-21T17-21-54Z
          command:
            - /bin/sh
            - -c
            - |
              set -e
              for i in $(seq 1 60); do
                mc alias set local http://minio:9000 \
                  "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD" && break
                sleep 2
              done
              mc mb -p local/firmware || true
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: minio-root
                  key: root-user
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minio-root
                  key: root-password
