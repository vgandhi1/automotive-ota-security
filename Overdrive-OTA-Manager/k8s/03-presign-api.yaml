apiVersion: v1
kind: Secret
metadata:
  name: presign-api-keys
  namespace: overdrive-ota
type: Opaque
stringData:
  keys: "k8s-dev-change-me"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: presign-api-config
  namespace: overdrive-ota
data:
  PRESIGN_API_ADDR: ":8080"
  S3_ENDPOINT: "http://minio.overdrive-ota.svc.cluster.local:9000"
  S3_REGION: "us-east-1"
  S3_BUCKET: "firmware"
  S3_USE_PATH_STYLE: "true"
  PRESIGN_TTL_SECONDS: "7200"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: presign-api
  namespace: overdrive-ota
spec:
  replicas: 2
  selector:
    matchLabels:
      app: presign-api
  template:
    metadata:
      labels:
        app: presign-api
    spec:
      containers:
        - name: presign-api
          image: presign-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: presign-api-config
          env:
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-root
                  key: root-user
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-root
                  key: root-password
            - name: PRESIGN_API_KEYS
              valueFrom:
                secretKeyRef:
                  name: presign-api-keys
                  key: keys
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
            capabilities:
              drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: presign-api
  namespace: overdrive-ota
spec:
  selector:
    app: presign-api
  ports:
    - name: http
      port: 8080
      targetPort: http
